<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- css -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- favicon icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="w-full flex gap-1 items-center flex-1">
                <img class="w-9 h-9" src="./assets/github-logo.png" alt="">
                <p>GitHub Issues Tracker</p>
            </div>
            <div class="flex gap-2">
                <input id="input-search" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <button id="btn-search" class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>

    <section>
        <div class="bg-white max-w-[1110px] mx-auto mt-16 shadow-sm flex items-center gap-2 mb-4 p-6 rounded-lg">
            <button id="all-btn" class="btn btn-primary px-12 py-3 font-medium text-base">All</button>
            <button id="open-btn" class="btn btn-soft px-10 py-3 font-medium text-base">Open</button>
            <button id="closed-btn" class="btn btn-soft px-8 py-3 font-medium text-base">Closed</button>
        </div>

        <div class="max-w-[1110px] mx-auto flex justify-between items-center shadow-md p-6 rounded-t-lg">
            <div class="flex items-center gap-2">
                <img class="bg-[#ECE4FF] p-2 rounded-full" src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="font-semibold text-xl text-[#1F2937]"><span id="total-issue">0</span> issues</h2>
                    <p class="text-base text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-[#00A96E] rounded-full inline-block"></span>
                    <span class="text-base font-medium text-[#1F2937]">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-[#A855F7] rounded-full inline-block"></span>
                    <span class="text-base font-medium text-[#1F2937]">Closed</span>
                </div>
            </div>
        </div>
    </section>

    <section id="spinner" class="flex justify-center items-center p-5 hidden">
        <span class="loading loading-spinner text-error"></span>
    </section>

    <section id="card-container" class="bg-[#F8FAFC] p-8 max-w-[1110px] mx-auto grid grid-cols-2 md:grid-cols-4 gap-3">

    </section>

    <!-- modal -->
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

       <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="issue-details" class="">
                
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="./js/main.js"></script>
</body>

</html>
